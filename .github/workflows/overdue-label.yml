name: Auto Label Overdue Issues

on:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours
  workflow_dispatch:

jobs:
  label-overdue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install @octokit/rest

      - name: Run Overdue Label Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node <<'EOF'
          import { Octokit } from "@octokit/rest";

          const octokit = new Octokit({
              auth: process.env.GITHUB_TOKEN,
          });

          const owner = process.env.GITHUB_REPOSITORY.split("/")[0];
          const repo = process.env.GITHUB_REPOSITORY.split("/")[1];

          const HOURS = 48;

          async function run() {
              const issues = await octokit.issues.listForRepo({
                  owner,
                  repo,
                  state: "open",
                  per_page: 100,
              });

              const now = new Date();

              for (const issue of issues.data) {
                  // skip pull requests
                  if (issue.pull_request) continue;

                  const lastUpdated = new Date(issue.updated_at);
                  const diffHours = (now - lastUpdated) / (1000 * 60 * 60);

                  const labels = issue.labels.map((l) => l.name);

                  // ADD label if overdue
                  if (diffHours >= HOURS && !labels.includes("overdue")) {
                      await octokit.issues.addLabels({
                          owner,
                          repo,
                          issue_number: issue.number,
                          labels: ["overdue"],
                      });

                      console.log(`Added overdue label to issue #${issue.number}`);
                  }

                  // REMOVE label if issue becomes active again
                  if (diffHours < HOURS && labels.includes("overdue")) {
                      await octokit.issues.removeLabel({
                          owner,
                          repo,
                          issue_number: issue.number,
                          name: "overdue",
                      });

                      console.log(`Removed overdue label from issue #${issue.number}`);
                  }
              }
          }

          run();
          EOF
