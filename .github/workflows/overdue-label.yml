name: Auto Label Overdue Issues

on:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours
  workflow_dispatch:

jobs:
  label-overdue:
    runs-on: ubuntu-latest

    steps:
      - name: Label overdue issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const HOURS = 48;
            const now = new Date();

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            for (const issue of issues.data) {

              // Skip pull requests
              if (issue.pull_request) continue;

              const lastUpdated = new Date(issue.updated_at);
              const diffHours = (now - lastUpdated) / (1000 * 60 * 60);

              const labels = issue.labels.map(l => l.name);

              // Add overdue label
              if (diffHours >= HOURS && !labels.includes("overdue")) {

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ["overdue"]
                });

                console.log(`Added overdue label to issue #${issue.number}`);
              }

              // Remove overdue label if issue becomes active again
              if (diffHours < HOURS && labels.includes("overdue")) {

                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: "overdue"
                });

                console.log(`Removed overdue label from issue #${issue.number}`);
              }
            }